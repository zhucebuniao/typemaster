<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>排序算法可视化</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0b0b0e;
  --surface:#121216;
  --border:rgba(255,255,255,0.06);
  --ink:#e4e4ea;
  --ink-muted:rgba(255,255,255,0.4);
  --ink-faint:rgba(255,255,255,0.1);
  --accent:#7c8aff;
  --accent-glow:rgba(124,138,255,0.12);
  --orange:#fb923c;
  --green:#68d391;
  --red:#f87171;
  --yellow:#fbbf24;
  --radius-sm:6px;
  --radius-md:10px;
  --radius-lg:14px;
  --font:'Inter',system-ui,-apple-system,sans-serif;
  --font-mono:'JetBrains Mono','SF Mono',monospace;
}
html,body{height:100%}
body{
  font-family:var(--font);background:var(--bg);color:var(--ink);
  display:flex;flex-direction:column;
  -webkit-font-smoothing:antialiased;
}

/* ── Top bar ── */
.topbar{
  display:flex;align-items:center;gap:12px;
  padding:12px 20px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
.logo{
  font-size:14px;font-weight:600;letter-spacing:-.3px;
  display:flex;align-items:center;gap:6px;
  margin-right:8px;
}
.logo span{color:var(--accent)}
.ctrl-group{
  display:flex;align-items:center;gap:6px;
}
.ctrl-group label{
  font-size:10px;font-weight:500;letter-spacing:.8px;
  text-transform:uppercase;color:var(--ink-muted);
  white-space:nowrap;
}
select{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--ink);font-size:12px;font-family:var(--font);
  padding:5px 10px;outline:none;cursor:pointer;
}
select:focus{border-color:var(--accent)}
input[type=range]{
  -webkit-appearance:none;appearance:none;
  width:60px;height:4px;border-radius:2px;
  background:var(--border);outline:none;
}
input[type=range]::-webkit-slider-thumb{
  -webkit-appearance:none;appearance:none;
  width:12px;height:12px;border-radius:50%;
  background:var(--accent);cursor:pointer;
}
.ctrl-value{font-size:11px;color:var(--ink-muted);min-width:18px;text-align:center;font-family:var(--font-mono)}

.btn{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border);border-radius:var(--radius-sm);
  color:var(--ink);font-size:12px;font-family:var(--font);
  padding:5px 12px;cursor:pointer;transition:all .15s;
  display:flex;align-items:center;gap:4px;
}
.btn:hover{background:rgba(255,255,255,0.08);color:#fff}
.btn:active{transform:scale(.95)}
.btn.primary{background:var(--accent-glow);border-color:rgba(124,138,255,0.25);color:var(--accent)}
.btn.primary:hover{background:rgba(124,138,255,0.2)}
.btn.danger{background:rgba(248,113,113,0.08);border-color:rgba(248,113,113,0.2);color:var(--red)}
.btn.danger:hover{background:rgba(248,113,113,0.15)}
.spacer{flex:1}

/* ── Chart ── */
.chart-area{
  flex:1;display:flex;align-items:flex-end;
  padding:12px 16px 0;gap:2px;
  position:relative;
  overflow:hidden;
}
.bar{
  flex:1;border-radius:2px 2px 0 0;
  transition:background .12s,height .08s ease;
  min-width:2px;
}
.bar.default{background:linear-gradient(to top,var(--accent),rgba(124,138,255,0.5))}
.bar.comparing{background:linear-gradient(to top,var(--orange),rgba(251,146,60,0.5))}
.bar.swapping{background:linear-gradient(to top,var(--red),rgba(248,113,113,0.5))}
.bar.sorted{background:linear-gradient(to top,var(--green),rgba(104,211,145,0.5))}
.bar.pivot{background:linear-gradient(to top,var(--yellow),rgba(251,191,36,0.5))}

/* ── Stats bar ── */
.stats{
  display:flex;gap:24px;
  padding:10px 20px;font-size:11px;
  color:var(--ink-muted);font-family:var(--font-mono);
  border-top:1px solid var(--border);
  flex-wrap:wrap;
}
.stat-item{display:flex;align-items:center;gap:6px}
.stat-label{color:var(--ink-faint);text-transform:uppercase;font-size:9px;letter-spacing:.5px;font-family:var(--font)}
.stat-value{color:var(--ink)}
.stat-dot{width:6px;height:6px;border-radius:50%;display:inline-block}

/* ── Legend ── */
.legend{
  display:flex;gap:12px;padding:10px 20px 0;
  font-size:10px;color:var(--ink-muted);
  flex-wrap:wrap;
}
.legend-item{display:flex;align-items:center;gap:4px}
.legend-swatch{width:10px;height:10px;border-radius:2px;flex-shrink:0}

/* ── Algorithm info ── */
.algo-info{
  margin:10px 20px 0;
  font-size:12px;color:var(--ink-muted);line-height:1.6;
}
.algo-info strong{color:var(--ink);font-weight:500}

/* ── Code panel ── */
.code-panel{
  margin:10px 20px 16px;
  background:rgba(255,255,255,0.02);
  border:1px solid var(--border);border-radius:var(--radius-md);
  overflow:hidden;
}
.code-header{
  display:flex;align-items:center;gap:8px;
  padding:6px 12px;font-size:10px;color:var(--ink-faint);
  text-transform:uppercase;letter-spacing:.5px;
  border-bottom:1px solid var(--border);
  cursor:pointer;user-select:none;
}
.code-header:hover{color:var(--ink-muted)}
.code-header .arrow{transition:transform .2s;font-size:8px}
.code-header .arrow.open{transform:rotate(90deg)}
.code-body{display:none;padding:12px;overflow-x:auto}
.code-body.open{display:block}
.code-body pre{
  font-family:var(--font-mono);font-size:12px;line-height:1.6;
  color:var(--ink-muted);white-space:pre;
}
.code-body .kw{color:#c084fc}
.code-body .fn{color:#67e8f9}
.code-body .var{color:#f9a8d4}
.code-body .num{color:#fbbf24}
.code-body .cm{color:rgba(255,255,255,0.2)}
.code-body .op{color:#e4e4ea}
.code-body .str{color:#68d391}

/* ── Empty state ── */
.empty-state{
  flex:1;display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:8px;
  color:var(--ink-faint);font-size:14px;
}

/* ── Mobile ── */
@media(max-width:640px){
  .topbar{padding:10px 12px;gap:8px}
  .logo{font-size:13px;margin-right:0}
  .ctrl-group label{display:none}
  select{font-size:11px;padding:4px 8px}
  input[type=range]{width:48px}
  .btn{font-size:11px;padding:4px 8px}
  .chart-area{padding:8px 8px 0;gap:1.5px}
  .stats{gap:12px;padding:8px 12px;font-size:10px}
  .legend{padding:8px 12px 0;gap:8px;font-size:9px}
  .algo-info{margin:8px 12px 0;font-size:11px}
  .code-panel{margin:8px 12px 12px}
  .code-body pre{font-size:10px}
}
</style>
</head>
<body>

<div class="topbar">
  <div class="logo"><span>◈</span> 排序可视化</div>

  <div class="ctrl-group">
    <label>算法</label>
    <select id="algoSelect">
      <option value="bubble">冒泡排序</option>
      <option value="selection">选择排序</option>
      <option value="insertion">插入排序</option>
      <option value="quick" selected>快速排序</option>
      <option value="merge">归并排序</option>
    </select>
  </div>

  <div class="ctrl-group">
    <label>数量</label>
    <input type="range" id="sizeSlider" min="8" max="80" value="30">
    <span class="ctrl-value" id="sizeVal">30</span>
  </div>

  <div class="ctrl-group">
    <label>速度</label>
    <input type="range" id="speedSlider" min="1" max="10" value="5">
    <span class="ctrl-value" id="speedVal">5</span>
  </div>

  <div class="spacer"></div>

  <button class="btn primary" id="playBtn">▶ 运行</button>
  <button class="btn" id="resetBtn">↺ 重置</button>
</div>

<div class="legend">
  <div class="legend-item"><span class="legend-swatch" style="background:var(--accent)"></span> 未处理</div>
  <div class="legend-item"><span class="legend-swatch" style="background:var(--orange)"></span> 比较中</div>
  <div class="legend-item"><span class="legend-swatch" style="background:var(--red)"></span> 交换中</div>
  <div class="legend-item"><span class="legend-swatch" style="background:var(--green)"></span> 已排序</div>
  <div class="legend-item"><span class="legend-swatch" style="background:var(--yellow)"></span> 基准值</div>
</div>

<div class="algo-info" id="algoInfo"></div>

<div class="chart-area" id="chart"></div>

<div class="stats">
  <div class="stat-item"><span class="stat-label">比较</span><span class="stat-value" id="statCompares">0</span></div>
  <div class="stat-item"><span class="stat-label">交换</span><span class="stat-value" id="statSwaps">0</span></div>
  <div class="stat-item"><span class="stat-label">数组长度</span><span class="stat-value" id="statSize">0</span></div>
  <div class="stat-item" id="statTimeWrap" style="display:none"><span class="stat-label">用时</span><span class="stat-value" id="statTime">0ms</span></div>
</div>

<div class="code-panel" id="codePanel">
  <div class="code-header" id="codeToggle">
    <span class="arrow">▶</span> 查看算法源码
  </div>
  <div class="code-body" id="codeBody">
    <pre id="codePre"></pre>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  Sorting Algorithms (async generators)
// ═══════════════════════════════════════════

function* bubbleSort(arr){
  const a=[...arr];let n=a.length;
  for(let i=0;i<n-1;i++){
    for(let j=0;j<n-1-i;j++){
      yield{type:'compare',indices:[j,j+1],array:[...a]};
      if(a[j]>a[j+1]){
        [a[j],a[j+1]]=[a[j+1],a[j]];
        yield{type:'swap',indices:[j,j+1],array:[...a]};
      }
    }
    yield{type:'sorted',indices:[n-1-i],array:[...a]};
  }
  yield{type:'sorted',indices:[0],array:[...a]};
  yield{type:'done',array:[...a]};
}

function* selectionSort(arr){
  const a=[...arr];let n=a.length;
  for(let i=0;i<n-1;i++){
    let minIdx=i;
    for(let j=i+1;j<n;j++){
      yield{type:'compare',indices:[minIdx,j],array:[...a]};
      if(a[j]<a[minIdx]){minIdx=j}
    }
    if(minIdx!==i){
      [a[i],a[minIdx]]=[a[minIdx],a[i]];
      yield{type:'swap',indices:[i,minIdx],array:[...a]};
    }
    yield{type:'sorted',indices:[i],array:[...a]};
  }
  yield{type:'sorted',indices:[n-1],array:[...a]};
  yield{type:'done',array:[...a]};
}

function* insertionSort(arr){
  const a=[...arr];let n=a.length;
  for(let i=1;i<n;i++){
    let j=i;
    while(j>0){
      yield{type:'compare',indices:[j-1,j],array:[...a]};
      if(a[j-1]>a[j]){
        [a[j-1],a[j]]=[a[j],a[j-1]];
        yield{type:'swap',indices:[j-1,j],array:[...a]};
        j--;
      }else break;
    }
    if(j===i) yield{type:'compare',indices:[i-1,i],array:[...a]};
  }
  for(let i=0;i<n;i++) yield{type:'sorted',indices:[i],array:[...a]};
  yield{type:'done',array:[...a]};
}

function* quickSort(arr){
  const a=[...arr];
  function* qs(lo,hi){
    if(lo>=hi){if(lo===hi)yield{type:'sorted',indices:[lo],array:[...a]};return}
    let pivot=a[hi];
    yield{type:'pivot',indices:[hi],array:[...a]};
    let i=lo-1;
    for(let j=lo;j<hi;j++){
      yield{type:'compare',indices:[j,hi],array:[...a]};
      if(a[j]<pivot){
        i++;
        [a[i],a[j]]=[a[j],a[i]];
        yield{type:'swap',indices:[i,j],array:[...a]};
      }
    }
    [a[i+1],a[hi]]=[a[hi],a[i+1]];
    yield{type:'swap',indices:[i+1,hi],array:[...a]};
    yield{type:'sorted',indices:[i+1],array:[...a]};
    yield* qs(lo,i);
    yield* qs(i+2,hi);
  }
  yield* qs(0,a.length-1);
  yield{type:'done',array:[...a]};
}

function* mergeSort(arr){
  const a=[...arr];
  function* ms(lo,hi,depth=0){
    if(hi-lo<2){
      if(hi-lo===1)yield{type:'sorted',indices:[lo],array:[...a]};
      return;
    }
    const mid=lo+Math.floor((hi-lo)/2);
    yield* ms(lo,mid,depth+1);
    yield* ms(mid,hi,depth+1);
    // merge
    const left=a.slice(lo,mid),right=a.slice(mid,hi);
    let i=0,j=0,k=lo;
    while(i<left.length&&j<right.length){
      yield{type:'compare',indices:[lo+i,mid+j],array:[...a]};
      if(left[i]<=right[j]){
        a[k]=left[i];i++;
      }else{
        a[k]=right[j];j++;
      }
      yield{type:'swap',indices:[k],array:[...a]};
      k++;
    }
    while(i<left.length){a[k]=left[i];yield{type:'swap',indices:[k],array:[...a]};i++;k++}
    while(j<right.length){a[k]=right[j];yield{type:'swap',indices:[k],array:[...a]};j++;k++}
    for(let p=lo;p<hi;p++) yield{type:'sorted',indices:[p],array:[...a]};
  }
  yield* ms(0,a.length);
  yield{type:'done',array:[...a]};
}

// ═══════════════════════════════════════════
//  Algorithm code snippets
// ═══════════════════════════════════════════

const ALGO_CODES = {
  bubble: `function bubbleSort(arr) {
  const n = arr.length;
  for (let i = 0; i < n - 1; i++) {
    for (let j = 0; j < n - 1 - i; j++) {
      <span class="cm">// 比较相邻元素</span>
      <span class="kw">if</span> (arr[j] > arr[j + 1]) {
        <span class="cm">// 交换</span>
        [arr[j], arr[j + 1]] = [arr[j + 1], arr[j]];
      }
    }
  }
  <span class="kw">return</span> arr;
}`,
  selection: `function selectionSort(arr) {
  const n = arr.length;
  for (let i = 0; i < n - 1; i++) {
    let minIdx = i;
    for (let j = i + 1; j < n; j++) {
      <span class="kw">if</span> (arr[j] < arr[minIdx]) {
        minIdx = j;  <span class="cm">// 更新最小索引</span>
      }
    }
    <span class="kw">if</span> (minIdx !== i) {
      [arr[i], arr[minIdx]] = [arr[minIdx], arr[i]];
    }
  }
  <span class="kw">return</span> arr;
}`,
  insertion: `function insertionSort(arr) {
  const n = arr.length;
  for (let i = 1; i < n; i++) {
    let j = i;
    <span class="kw">while</span> (j > 0 && arr[j - 1] > arr[j]) {
      [arr[j - 1], arr[j]] = [arr[j], arr[j - 1]];
      j--;
    }
  }
  <span class="kw">return</span> arr;
}`,
  quick: `function quickSort(arr) {
  <span class="kw">if</span> (arr.length <= 1) <span class="kw">return</span> arr;
  const pivot = arr[arr.length - 1];
  const left = [], right = [];
  for (let i = 0; i < arr.length - 1; i++) {
    <span class="kw">if</span> (arr[i] < pivot) left.push(arr[i]);
    <span class="kw">else</span> right.push(arr[i]);
  }
  <span class="kw">return</span> [...quickSort(left), pivot, ...quickSort(right]);
}`,
  merge: `function mergeSort(arr) {
  <span class="kw">if</span> (arr.length <= 1) <span class="kw">return</span> arr;
  const mid = Math.floor(arr.length / 2);
  const left = mergeSort(arr.slice(0, mid));
  const right = mergeSort(arr.slice(mid));
  <span class="kw">return</span> merge(left, right);  <span class="cm">// 合并有序数组</span>
}

<span class="kw">function</span> <span class="fn">merge</span>(left, right) {
  const result = [];
  <span class="kw">while</span> (left.length && right.length) {
    <span class="kw">if</span> (left[0] <= right[0]) result.push(left.shift());
    <span class="kw">else</span> result.push(right.shift());
  }
  <span class="kw">return</span> [...result, ...left, ...right];
}`,
};

// ═══════════════════════════════════════════
//  Algorithm info
// ═══════════════════════════════════════════

const ALGO_INFO = {
  bubble: '<strong>冒泡排序</strong> — 重复遍历数组，比较相邻元素并交换逆序对。每轮遍历将最大元素「冒泡」到末尾。时间复杂度 <strong>O(n²)</strong>，稳定排序。',
  selection: '<strong>选择排序</strong> — 每轮找到剩余元素中的最小值，交换到已排序区末尾。时间复杂度 <strong>O(n²)</strong>，不稳定排序。',
  insertion: '<strong>插入排序</strong> — 将数组视为已排序和未排序两部分，逐个将未排序元素插入到已排序区的正确位置。时间复杂度 <strong>O(n²)</strong>，稳定排序。',
  quick: '<strong>快速排序</strong> — 选取基准值（pivot），将小于基准的元素移到左边、大于的移到右边，递归对左右分区排序。平均 <strong>O(n log n)</strong>，不稳定。',
  merge: '<strong>归并排序</strong> — 分治思想：将数组递归分成两半，分别排序后合并（merge）为有序数组。时间复杂度 <strong>O(n log n)</strong>，稳定排序。',
};

// ═══════════════════════════════════════════
//  DOM refs
// ═══════════════════════════════════════════

const chart = document.getElementById('chart');
const algoSelect = document.getElementById('algoSelect');
const sizeSlider = document.getElementById('sizeSlider');
const sizeVal = document.getElementById('sizeVal');
const speedSlider = document.getElementById('speedSlider');
const speedVal = document.getElementById('speedVal');
const playBtn = document.getElementById('playBtn');
const resetBtn = document.getElementById('resetBtn');
const statCompares = document.getElementById('statCompares');
const statSwaps = document.getElementById('statSwaps');
const statSize = document.getElementById('statSize');
const statTime = document.getElementById('statTime');
const statTimeWrap = document.getElementById('statTimeWrap');
const algoInfo = document.getElementById('algoInfo');
const codePre = document.getElementById('codePre');
const codeBody = document.getElementById('codeBody');
const codeToggle = document.getElementById('codeToggle');

// ═══════════════════════════════════════════
//  State
// ═══════════════════════════════════════════

let array = [];
let running = false;
let paused = false;
let generator = null;
let compares = 0;
let swaps = 0;
let startTime = 0;
let timerInterval = null;
let animationId = null;

const CLASS_MAP = {
  default:'default',compare:'comparing',swap:'swapping',
  sorted:'sorted',pivot:'pivot'
};
const STATE_COLORS = {
  default: 'var(--accent)',
  compare: 'var(--orange)',
  swap: 'var(--red)',
  sorted: 'var(--green)',
  pivot: 'var(--yellow)',
};

// ═══════════════════════════════════════════
//  Array ops
// ═══════════════════════════════════════════

function generateArray(n){
  const a=[];
  for(let i=0;i<n;i++) a.push(Math.floor(Math.random()*85)+15);
  return a;
}

function resetArray(){
  if(running) stop();
  const n=parseInt(sizeSlider.value);
  array=generateArray(n);
  compares=0;swaps=0;
  statCompares.textContent='0';
  statSwaps.textContent='0';
  statSize.textContent=n;
  statTimeWrap.style.display='none';
  renderBars(array);
  updateCode();
}

// ═══════════════════════════════════════════
//  Render
// ═══════════════════════════════════════════

function renderBars(arr,states={}){
  if(!arr||!arr.length) return;
  const max=Math.max(...arr);
  chart.innerHTML=arr.map((v,i)=>{
    const h=(v/max*100).toFixed(1);
    const cls=states[i]||'default';
    return `<div class="bar ${CLASS_MAP[cls]||'default'}" style="height:${h}%" data-i="${i}"></div>`;
  }).join('');
}

function updateStats(arr,states={}){
  statCompares.textContent=compares;
  statSwaps.textContent=swaps;
  const bars=chart.querySelectorAll('.bar');
  bars.forEach((bar,i)=>{
    const cls=states[i]||'default';
    bar.className=`bar ${CLASS_MAP[cls]||'default'}`;
  });
}

// ═══════════════════════════════════════════
//  Animation
// ═══════════════════════════════════════════

function getDelay(){
  // speed 1-10 → delay 200-10ms (exponential-ish)
  const s=parseInt(speedSlider.value);
  const size=parseInt(sizeSlider.value);
  const base=Math.max(5,200-Math.pow(s-1,1.5)*13);
  return Math.max(2,base/(size/15));
}

function run(){
  if(running&&paused){
    paused=false;
    playBtn.textContent='⏸ 暂停';
    step();
    return;
  }
  if(running){
    paused=true;
    playBtn.textContent='▶ 继续';
    return;
  }

  const algo=algoSelect.value;
  resetArray();
  compares=0;swaps=0;
  statCompares.textContent='0';
  statSwaps.textContent='0';
  statTimeWrap.style.display='none';

  const generators={
    bubble:bubbleSort,selection:selectionSort,
    insertion:insertionSort,quick:quickSort,merge:mergeSort
  };
  generator=generators[algo](array);
  running=true;paused=false;
  playBtn.textContent='⏸ 暂停';
  resetBtn.disabled=true;
  algoSelect.disabled=true;
  sizeSlider.disabled=true;
  speedSlider.disabled=true;
  startTime=performance.now();
  timerInterval=setInterval(()=>{
    const elapsed=performance.now()-startTime;
    statTimeWrap.style.display='flex';
    statTime.textContent=elapsed<1000?`${Math.round(elapsed)}ms`:`${(elapsed/1000).toFixed(1)}s`;
  },50);
  step();
}

function step(){
  if(!running||paused) return;

  const delay=getDelay();
  const t0=performance.now();

  let stepsPerFrame=1;
  if(delay<10) stepsPerFrame=Math.ceil(10/delay);

  for(let s=0;s<stepsPerFrame;s++){
    const result=generator.next();
    if(result.done){
      finish();
      return;
    }
    const op=result.value;
    const states={};

    if(op.type==='compare'){
      compares++;
      op.indices.forEach(i=>{states[i]='compare'});
    }else if(op.type==='swap'){
      swaps++;
      op.indices.forEach(i=>{states[i]='swap'});
    }else if(op.type==='sorted'){
      op.indices.forEach(i=>{states[i]='sorted'});
    }else if(op.type==='pivot'){
      op.indices.forEach(i=>{states[i]='pivot'});
    }else if(op.type==='done'){
      // all sorted
    }

    // Mark all previously sorted items
    array=op.array;
    updateStats(op.array,states);
  }

  const elapsed=performance.now()-t0;
  const actualDelay=Math.max(0,delay-elapsed);
  animationId=setTimeout(step,actualDelay);
}

function finish(){
  running=false;paused=false;
  playBtn.textContent='✓ 完成';
  playBtn.disabled=false;
  resetBtn.disabled=false;
  algoSelect.disabled=false;
  sizeSlider.disabled=false;
  speedSlider.disabled=false;
  if(timerInterval){clearInterval(timerInterval);timerInterval=null}
  const elapsed=performance.now()-startTime;
  statTimeWrap.style.display='flex';
  statTime.textContent=elapsed<1000?`${Math.round(elapsed)}ms`:`${(elapsed/1000).toFixed(1)}s`;
}

function stop(){
  running=false;paused=false;
  if(animationId){clearTimeout(animationId);animationId=null}
  if(timerInterval){clearInterval(timerInterval);timerInterval=null}
  playBtn.textContent='▶ 运行';
  resetBtn.disabled=false;
  algoSelect.disabled=false;
  sizeSlider.disabled=false;
  speedSlider.disabled=false;
}

// ═══════════════════════════════════════════
//  Code display
// ═══════════════════════════════════════════

function updateCode(){
  const algo=algoSelect.value;
  codePre.innerHTML=ALGO_CODES[algo]||'// 暂无源码';
  algoInfo.innerHTML=ALGO_INFO[algo]||'';
}

// ═══════════════════════════════════════════
//  Events
// ═══════════════════════════════════════════

playBtn.addEventListener('click',run);

resetBtn.addEventListener('click',()=>{
  if(running) stop();
  resetArray();
});

algoSelect.addEventListener('change',()=>{
  if(!running) resetArray();
  updateCode();
});

sizeSlider.addEventListener('input',()=>{
  sizeVal.textContent=sizeSlider.value;
  if(!running) resetArray();
});

speedSlider.addEventListener('input',()=>{
  speedVal.textContent=speedSlider.value;
});

codeToggle.addEventListener('click',()=>{
  const isOpen=codeBody.classList.toggle('open');
  codeToggle.querySelector('.arrow').classList.toggle('open',isOpen);
});

window.addEventListener('load',()=>{
  resetArray();
  updateCode();
});
</script>
</body>
